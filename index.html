<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro de Aluno</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class = " container">
        <h1> Cadastro de Alunos </h1>
        <form id = "cadarstroForm">
            <input type="text" id="nomeAluno" placeholder="Nome do Aluno" required>
            <input type="text" id="idadeAluno" placeholder="Idade do Aluno" required>
            <button type="submit" id = "bntSalvar"> Cadastrar </button>
        </form>
    </div>
    
</body>
</html>
